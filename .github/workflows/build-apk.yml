name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compiler l'APK (debug)
        run: gradle assembleDebug --no-daemon

      - name: Renommer l'APK
        run: cp app/build/outputs/apk/debug/app-debug.apk tarot-mystique.apk

      - name: Publier l'APK en artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarot-mystique-apk
          path: tarot-mystique.apk

      - name: Créer une Release (si tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tarot-mystique.apk
