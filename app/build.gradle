plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mystique.tarot'
    compileSdk 34

    defaultConfig {
        applicationId "com.mystique.tarot"
        minSdk 24
        targetSdk 34
        versionCode 3
        versionName "2.1"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
