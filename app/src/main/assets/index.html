<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tarot Français</title>
<style>
  :root {
    --nuit: #100C22;
    --tapis: #1C4232;
    --tapis-fonce: #123024;
    --panneau: #1D1640;
    --or: #C9A227;
    --or-clair: #E8CA6C;
    --ivoire: #EFE7D3;
    --ivoire-2: #B9AF97;
    --rouge: #A31F24;
    --hc: 108px; /* hauteur carte main */
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; font-family: Georgia, serif;
    background: var(--nuit); color: var(--ivoire); user-select:none; -webkit-user-select:none; }

  .ecran { position:fixed; inset:0; display:none; flex-direction:column; }
  .ecran.on { display:flex; }

  /* ---------- accueil ---------- */
  #menu { align-items:center; justify-content:center; gap:8px; padding:20px;
    background: radial-gradient(ellipse 120% 60% at 50% -10%, #241A4E 0%, transparent 60%), var(--nuit); }
  .surtitre { font-family:system-ui,sans-serif; font-size:11px; letter-spacing:.35em;
    text-transform:uppercase; color:var(--or); text-indent:.35em; }
  #menu h1 { font-size:clamp(34px,9vw,44px); font-weight:400; letter-spacing:.1em;
    text-transform:uppercase; text-align:center; text-shadow:0 0 30px rgba(201,162,39,.25); }
  .filet { display:flex; align-items:center; gap:10px; color:var(--or); margin:10px 0 20px; }
  .filet::before,.filet::after { content:''; width:54px; height:1px;
    background:linear-gradient(90deg,transparent,var(--or)); }
  .filet::after { background:linear-gradient(90deg,var(--or),transparent); }
  .menu-btns { display:flex; flex-direction:column; gap:12px; width:min(300px,85vw); }
  .btn-mode { background:linear-gradient(160deg,#251C52,var(--panneau));
    border:1px solid rgba(201,162,39,.45); border-radius:12px; padding:15px 20px;
    color:var(--ivoire); text-align:left; cursor:pointer; }
  .btn-mode:active { transform:scale(.97); }
  .btn-mode .t { font-size:18px; color:var(--or-clair); }
  .btn-mode .d { font-family:system-ui,sans-serif; font-size:12px; color:var(--ivoire-2); margin-top:3px; }
  #scores-cumul { font-family:system-ui,sans-serif; font-size:13px; color:var(--ivoire-2);
    margin-top:22px; text-align:center; line-height:1.7; }
  #btn-raz { background:none; border:none; color:var(--or); font-size:11px;
    font-family:system-ui,sans-serif; letter-spacing:.15em; text-transform:uppercase;
    margin-top:8px; cursor:pointer; text-decoration:underline; }

  /* ---------- table de jeu ---------- */
  #jeu { background:
    radial-gradient(ellipse 90% 70% at 50% 40%, var(--tapis) 0%, var(--tapis-fonce) 75%, #0d221a 100%); }

  #adversaires { display:flex; justify-content:space-evenly; padding:10px 6px 4px;
    padding-top:max(10px, env(safe-area-inset-top)); }
  .adv { display:flex; flex-direction:column; align-items:center; gap:3px; width:76px; position:relative; }
  .avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:20px; color:var(--nuit); background:var(--ivoire-2);
    border:2px solid rgba(201,162,39,.5); transition: box-shadow .3s, border-color .3s; }
  .adv.actif .avatar { border-color:var(--or-clair); box-shadow:0 0 16px rgba(232,202,108,.7); }
  .adv .nom { font-family:system-ui,sans-serif; font-size:11px; color:var(--ivoire); }
  .adv .nbc { font-family:system-ui,sans-serif; font-size:10px; color:var(--ivoire-2); }
  .badge { font-family:system-ui,sans-serif; font-size:8.5px; letter-spacing:.12em;
    text-transform:uppercase; padding:2px 6px; border-radius:3px; margin-top:1px; }
  .badge.preneur { background:var(--or); color:var(--nuit); }
  .badge.partenaire { background:var(--or-clair); color:var(--nuit); }
  .badge.donneur { background:rgba(239,231,211,.25); color:var(--ivoire); }
  .bulle { position:absolute; top:100%; left:50%; transform:translateX(-50%); margin-top:4px;
    background:var(--ivoire); color:var(--nuit); font-family:system-ui,sans-serif;
    font-size:11px; padding:4px 9px; border-radius:10px; white-space:nowrap; z-index:5;
    animation:pop .25s ease; }
  .bulle::before { content:''; position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
    border:5px solid transparent; border-bottom-color:var(--ivoire); }
  @keyframes pop { from { opacity:0; transform:translateX(-50%) scale(.7) } to { opacity:1; transform:translateX(-50%) scale(1) } }

  #bandeau { text-align:center; font-family:system-ui,sans-serif; font-size:11.5px;
    letter-spacing:.14em; text-transform:uppercase; color:var(--or-clair); min-height:18px;
    text-indent:.14em; padding:2px 10px; }

  #tapis { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
  #pli { display:flex; gap:8px; align-items:flex-end; justify-content:center; flex-wrap:wrap; padding:0 8px; }
  .pose { display:flex; flex-direction:column; align-items:center; gap:4px; animation:pose .3s ease; }
  @keyframes pose { from { opacity:0; transform:translateY(14px) scale(.85) } to { opacity:1; transform:none } }
  .pose .qui { font-family:system-ui,sans-serif; font-size:10px; color:var(--ivoire-2); }

  #message-tapis { position:absolute; inset:0; display:none; align-items:center;
    justify-content:center; text-align:center; padding:20px;
    font-size:20px; letter-spacing:.05em; color:var(--ivoire);
    text-shadow:0 2px 12px rgba(0,0,0,.7); }
  #message-tapis.on { display:flex; }

  /* ---------- cartes ---------- */
  .carte { height:var(--hc); aspect-ratio:0.53; border-radius:7px; background:#FBF6E5;
    border:1px solid rgba(20,15,10,.55); box-shadow:0 4px 10px rgba(0,0,0,.45);
    overflow:hidden; flex-shrink:0; position:relative; }
  .carte img { width:100%; height:100%; object-fit:contain; display:block; }
  .carte.dos { background:var(--nuit); }
  .carte.moy { --hc:118px; height:118px; }
  .carte.grande { height:150px; }

  /* ---------- main du joueur ---------- */
  #zone-main { padding:6px 0 max(10px, env(safe-area-inset-bottom)); }
  #info-moi { display:flex; justify-content:center; align-items:center; gap:8px;
    font-family:system-ui,sans-serif; font-size:11px; color:var(--ivoire-2);
    padding-bottom:5px; min-height:22px; }
  #main { display:flex; overflow-x:auto; overflow-y:visible; padding:16px 14px 4px;
    scrollbar-width:none; }
  #main::-webkit-scrollbar { display:none; }
  #main .carte { margin-left:-30px; transition:transform .16s ease, filter .16s, box-shadow .16s; }
  #main .carte:first-child { margin-left:0; }
  #main .carte.jouable { cursor:pointer; }
  #main .carte.inerte { filter:brightness(.55) saturate(.6); }
  #main .carte.levee { transform:translateY(-16px); box-shadow:0 8px 18px rgba(0,0,0,.6), 0 0 14px rgba(232,202,108,.5); z-index:3; }
  #main .carte.choisie-ecart { transform:translateY(-16px); outline:3px solid var(--or); }

  /* ---------- overlays ---------- */
  .voile { position:fixed; inset:0; background:rgba(10,7,20,.78); display:none;
    align-items:center; justify-content:center; z-index:20; padding:16px; }
  .voile.on { display:flex; }
  .boite { background:linear-gradient(170deg,#251C52,var(--panneau));
    border:1px solid rgba(201,162,39,.45); border-radius:16px; padding:22px 20px;
    width:min(360px,94vw); max-height:88vh; overflow-y:auto; text-align:center; }
  .boite h2 { font-size:20px; color:var(--or-clair); font-weight:400; letter-spacing:.06em; margin-bottom:6px; }
  .boite .sous { font-family:system-ui,sans-serif; font-size:12.5px; color:var(--ivoire-2);
    line-height:1.5; margin-bottom:14px; }
  .rangee-btn { display:flex; flex-direction:column; gap:9px; }
  .btn { font-family:system-ui,sans-serif; font-size:12px; letter-spacing:.16em;
    text-transform:uppercase; text-indent:.16em; padding:12px 18px; border-radius:26px;
    cursor:pointer; border:none; }
  .btn:active { transform:scale(.96); }
  .btn.plein { background:var(--or); color:var(--nuit); }
  .btn.contour { background:transparent; color:var(--or); border:1px solid rgba(201,162,39,.6); }
  .btn:disabled { opacity:.35; pointer-events:none; }
  .chien-cartes { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:12px 0; }
  .rois { display:flex; gap:10px; justify-content:center; margin:14px 0; }
  .rois .carte { cursor:pointer; }
  .rois .carte:active { transform:scale(.95); }

  table.recap { width:100%; border-collapse:collapse; font-family:system-ui,sans-serif;
    font-size:13px; margin:10px 0; }
  .recap td { padding:5px 4px; border-bottom:1px solid rgba(239,231,211,.12); text-align:left; }
  .recap td:last-child { text-align:right; font-variant-numeric:tabular-nums; }
  .recap .tot td { border-bottom:none; color:var(--or-clair); font-weight:600; }
  .gagne { color:#7FD98B; } .perdu { color:#E0766D; }

  @media (max-height: 700px) { :root { --hc: 96px; } }
  @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation:none!important; transition-duration:.01s!important; } }
</style>
</head>
<body>

<!-- ================= MENU ================= -->
<div id="menu" class="ecran on">
  <div class="surtitre">Jeu de cartes traditionnel</div>
  <h1>Tarot<br>Français</h1>
  <div class="filet"><span>&#10022;</span></div>
  <div class="menu-btns">
    <button class="btn-mode" onclick="nouvellePartie(3)">
      <div class="t">3 joueurs</div><div class="d">24 cartes chacun · chien de 6</div>
    </button>
    <button class="btn-mode" onclick="nouvellePartie(4)">
      <div class="t">4 joueurs</div><div class="d">18 cartes chacun · chien de 6</div>
    </button>
    <button class="btn-mode" onclick="nouvellePartie(5)">
      <div class="t">5 joueurs</div><div class="d">15 cartes chacun · chien de 3 · appel du roi</div>
    </button>
  </div>
  <div id="scores-cumul"></div>
  <button id="btn-raz" onclick="razScores()">Remettre les scores à zéro</button>
</div>

<!-- ================= TABLE ================= -->
<div id="jeu" class="ecran">
  <div id="adversaires"></div>
  <div id="bandeau"></div>
  <div id="tapis">
    <div id="pli"></div>
    <div id="message-tapis"></div>
  </div>
  <div id="zone-main">
    <div id="info-moi"></div>
    <div id="main"></div>
  </div>
</div>

<!-- ================= OVERLAYS ================= -->
<div class="voile" id="v-encheres"><div class="boite">
  <h2>Enchères</h2>
  <div class="sous" id="ench-info"></div>
  <div class="rangee-btn" id="ench-btns"></div>
</div></div>

<div class="voile" id="v-roi"><div class="boite">
  <h2>Appel du roi</h2>
  <div class="sous">Choisis le roi que tu appelles : son détenteur sera ton partenaire secret.</div>
  <div class="rois" id="rois-choix"></div>
</div></div>

<div class="voile" id="v-chien"><div class="boite">
  <h2>Le Chien</h2>
  <div class="sous" id="chien-info"></div>
  <div class="chien-cartes" id="chien-cartes"></div>
  <div class="rangee-btn"><button class="btn plein" id="chien-ok">Continuer</button></div>
</div></div>

<div class="voile" id="v-fin"><div class="boite">
  <h2 id="fin-titre"></h2>
  <div class="sous" id="fin-detail"></div>
  <table class="recap" id="fin-table"></table>
  <div class="rangee-btn">
    <button class="btn plein" onclick="donneSuivante()">Donne suivante</button>
    <button class="btn contour" onclick="allerMenu()">Menu</button>
  </div>
</div></div>

<script src="jeu.js"></script>
</body>
</html>
